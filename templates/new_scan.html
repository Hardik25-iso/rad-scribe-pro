<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Scan — Rad-Scribe Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=Nunito+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
/* Core CSS */
:root{--navy:#1a2b4a;--teal:#00788a;--teal-lt:#e6f4f6;--white:#ffffff;--gray-50:#f7f9fb;--gray-100:#eef1f5;--gray-200:#d8dee8;--gray-400:#94a3b8;--gray-600:#475569;--green:#2e7d32;--red:#b71c1c;--border:#dde3ed;--text:#1e293b;--muted:#64748b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito Sans',sans-serif;background:var(--gray-50);color:var(--text);min-height:100vh;display:flex;}
a{text-decoration:none;color:inherit;}

/* Sidebar */
.sidebar{width:236px;min-height:100vh;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;}
.sb-header{padding:18px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.07);}
.sb-logo{display:flex;align-items:center;gap:9px;margin-bottom:3px;}
.sb-logo-mark{width:30px;height:30px;background:var(--teal);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'Source Serif 4',serif;font-weight:700;font-size:13px;color:#fff;}
.sb-logo-text{font-weight:800;font-size:14px;color:#fff;}
.sb-logo-text em{font-style:normal;color:#7ecfda;}
.sb-link{display:flex;align-items:center;gap:9px;padding:10px 20px;color:rgba(255,255,255,0.55);font-size:13px;font-weight:600;transition:all 0.15s;border-left:3px solid transparent;}
.sb-link:hover, .sb-link.active{color:#fff;background:rgba(255,255,255,0.04);border-left-color:var(--teal);}

/* Main Content */
.main{margin-left:236px;flex:1;display:flex;flex-direction:column;padding:30px;}
.page-title{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:24px;}

/* Upload Form */
.form-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:30px;max-width:700px;}
.fg{margin-bottom:20px;}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--gray-600);margin-bottom:8px;letter-spacing:0.5px;text-transform:uppercase;}
.fg input[type="text"], .fg select, .fg textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:14px;color:var(--text);outline:none;background:var(--gray-50);}
.fg input:focus, .fg select:focus, .fg textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,120,138,0.1);}

/* Drag & Drop Zone */
.upload-zone{border:2px dashed var(--gray-400);border-radius:8px;padding:40px 20px;text-align:center;cursor:pointer;background:var(--gray-50);transition:all 0.2s;}
.upload-zone:hover{border-color:var(--teal);background:var(--teal-lt);}
.upload-zone.active{border-color:var(--green);background:var(--green-lt);border-style:solid;}
.upload-icon{font-size:40px;margin-bottom:10px;}
.upload-text{font-size:14px;font-weight:700;color:var(--navy);}
.upload-sub{font-size:12px;color:var(--muted);margin-top:6px;}

.submit-btn{background:var(--teal);color:#fff;border:none;padding:14px 24px;border-radius:6px;font-weight:700;font-size:14px;cursor:pointer;width:100%;transition:background 0.2s;margin-top:10px;}
.submit-btn:hover{background:#006070;}
.flash{padding:12px;border-radius:6px;margin-bottom:20px;font-size:13px;font-weight:700;}
.flash.error{background:var(--red-lt);color:var(--red);border:1px solid rgba(182,28,28,0.2);}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sb-header">
    <div class="sb-logo">
      <div class="sb-logo-mark">R</div>
      <div class="sb-logo-text">Rad<em>Scribe</em> Pro</div>
    </div>
  </div>
  <a href="{{ url_for('doctor.dashboard') }}" class="sb-link active">← Back to Dashboard</a>
</div>

<div class="main">
  <div class="page-title">Upload New Chest X-Ray</div>

  <div class="form-card">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('doctor.new_scan') }}" enctype="multipart/form-data">
      
      <div class="fg">
        <label>1. Select X-Ray Image (JPEG, PNG, DICOM)</label>
        <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-inp').click()">
          <input type="file" name="xray_file" id="file-inp" accept="image/*,.dcm" style="display:none" onchange="handleFile(this)" required>
          <div class="upload-icon">🩻</div>
          <div class="upload-text" id="upload-text">Click to browse or drag file here</div>
          <div class="upload-sub">Max file size: 50MB</div>
        </div>
      </div>

      <div class="fg">
        <label>2. AI Model Selection</label>
        <select name="models">
          <option value="model_d">Model D — ViT + DenseNet (Recommended - Best Overall)</option>
          <option value="model_e">Model E — Verified RAG (CheXBert 78.25)</option>
          <option value="model_c">Model C — EfficientNet + FAISS RAG</option>
          <option value="model_b">Model B — EfficientNet + BioGPT</option>
          <option value="model_a">Model A — ResNet-50 + LSTM (Baseline)</option>
        </select>
      </div>

      <div class="fg">
        <label>3. Link to Patient (Optional)</label>
        <input type="text" name="patient_id" placeholder="Enter Patient ID (e.g., PID-123)">
      </div>

      <div class="fg">
        <label>4. Clinical Notes (Optional)</label>
        <textarea name="notes" rows="3" placeholder="Add any initial observations..."></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">Upload and Generate Report →</button>
    </form>
  </div>
</div>

<script>
function handleFile(input) {
  if (input.files && input.files[0]) {
    const zone = document.getElementById('upload-zone');
    zone.classList.add('active');
    document.getElementById('upload-text').textContent = '✓ ' + input.files[0].name;
  }
}

// Visual feedback when clicking submit
document.querySelector('form').addEventListener('submit', function() {
  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Uploading image...';
  btn.style.opacity = '0.7';
});
</script>
</body>
</html>
