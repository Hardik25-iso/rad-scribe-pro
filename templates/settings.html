<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — Rad-Scribe Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=Nunito+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#1a2b4a;--teal:#00788a;--teal-lt:#e6f4f6;--white:#ffffff;--gray-50:#f7f9fb;--gray-100:#eef1f5;--gray-200:#d8dee8;--gray-400:#94a3b8;--gray-600:#475569;--border:#dde3ed;--text:#1e293b;--muted:#64748b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito Sans',sans-serif;background:var(--gray-50);color:var(--text);min-height:100vh;display:flex;}
a{text-decoration:none;color:inherit;}
.sidebar{width:236px;min-height:100vh;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;}
.sb-header{padding:18px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.07);}
.sb-logo{display:flex;align-items:center;gap:9px;margin-bottom:3px;}
.sb-logo-mark{width:30px;height:30px;background:var(--teal);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'Source Serif 4',serif;font-weight:700;font-size:13px;color:#fff;}
.sb-logo-text{font-weight:800;font-size:14px;color:#fff;}
.sb-logo-text em{font-style:normal;color:#7ecfda;}
.sb-link{display:flex;align-items:center;gap:9px;padding:10px 20px;color:rgba(255,255,255,0.55);font-size:13px;font-weight:600;transition:all 0.15s;border-left:3px solid transparent;}
.sb-link:hover, .sb-link.active{color:#fff;background:rgba(255,255,255,0.04);border-left-color:var(--teal);}
.main{margin-left:236px;flex:1;display:flex;flex-direction:column;padding:30px;}
.page-title{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:24px;}
.card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:30px;max-width:700px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.fg{margin-bottom:20px;}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--gray-600);margin-bottom:8px;letter-spacing:0.5px;text-transform:uppercase;}
.fg input{width:100%;padding:12px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:14px;color:var(--text);background:var(--gray-50); outline: none;}
.fg input:disabled { color: var(--muted); cursor: not-allowed; }
.header-profile{display:flex;align-items:center;gap:16px;margin-bottom:30px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.hp-av{width:60px;height:60px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-family:'Source Serif 4',serif;font-weight:700;}
.hp-info h2{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:4px;}
.hp-info p{font-size:13px;color:var(--muted);}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sb-header">
    <div class="sb-logo">
      <div class="sb-logo-mark">R</div>
      <div class="sb-logo-text">Rad<em>Scribe</em> Pro</div>
    </div>
  </div>
  <a href="{{ url_for('doctor.dashboard') }}" class="sb-link">← Back to Dashboard</a>
  <a href="{{ url_for('doctor.settings') }}" class="sb-link active"><span class="ico">⚙️</span>Settings</a>
</div>

<div class="main">
  <div class="page-title">Account Settings</div>
  
  <div class="card">
    <div class="header-profile">
      <div class="hp-av">{{ doctor.full_name[:2].upper() }}</div>
      <div class="hp-info">
        <h2>Dr. {{ doctor.full_name }}</h2>
        <p>{{ doctor.specialization or 'Radiologist' }} · {{ doctor.hospital or 'Rad-Scribe Pro' }}</p>
      </div>
    </div>

    <div class="form-grid">
      <div class="fg">
        <label>Full Name</label>
        <input type="text" value="{{ doctor.full_name }}" disabled>
      </div>
      <div class="fg">
        <label>Email Address</label>
        <input type="email" value="{{ user.email }}" disabled>
      </div>
      <div class="fg">
        <label>Medical License Number</label>
        <input type="text" value="{{ doctor.license_number }}" disabled>
      </div>
      <div class="fg">
        <label>Specialization</label>
        <input type="text" value="{{ doctor.specialization or '—' }}" disabled>
      </div>
      <div class="fg">
        <label>Hospital / Clinic</label>
        <input type="text" value="{{ doctor.hospital or '—' }}" disabled>
      </div>
      <div class="fg">
        <label>City</label>
        <input type="text" value="{{ doctor.city or '—' }}" disabled>
      </div>
    </div>
    
    <p style="font-size:12px; color:var(--muted); margin-top:10px;">
      <em>Note: Profile editing is disabled in this academic demonstration build.</em>
    </p>
  </div>
</div>
</body>
</html>
